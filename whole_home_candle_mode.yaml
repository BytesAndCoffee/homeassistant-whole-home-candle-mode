                  {% endif %}
                next_kelvin: >-
                  {{ [[current_kelvin + (range(-55, 56) | random), min_kelvin] | max, max_kelvin | int] | min }}
                next_transition: "{{ [0.12, 0.16, 0.22, 0.28] | random }}"
                next_delay_ms: "{{ range(100, 301) | random }}"
            - continue_on_error: true
              action: light.turn_on
              target:
                entity_id: light.REPLACE_LAMP_2
              data:
                brightness: "{{ next_brightness }}"
                color_temp_kelvin: "{{ next_kelvin }}"
                transition: "{{ next_transition }}"
            - delay:
                milliseconds: "{{ next_delay_ms }}"

  candle_walk_lamp_3:
    alias: Candle Walk Lamp 3
    mode: restart
    sequence:
      - wait_template: "{{ is_state('light.REPLACE_LAMP_3', 'on') }}"
        timeout: "00:00:02"
        continue_on_timeout: true
      - delay:
          milliseconds: "{{ range(0, 250) | random }}"
      - repeat:
          while:
            - condition: state
              entity_id: input_boolean.candle_mode_all
              state: "on"
            - condition: state
