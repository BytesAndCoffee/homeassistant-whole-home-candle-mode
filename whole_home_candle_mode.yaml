                flare_brightness: "{{ 89 if cozy_mode else 217 }}"
                dip_brightness: "{{ 12 if cozy_mode else 140 }}"
                min_kelvin: 2202
                max_kelvin: "{{ 2302 if cozy_mode else 2502 }}"
                current_brightness: "{{ state_attr('light.REPLACE_SINGLE_TARGET', 'brightness') | int(40 if cozy_mode else 179) }}"
                current_kelvin: "{{ state_attr('light.REPLACE_SINGLE_TARGET', 'color_temp_kelvin') | int(2240 if cozy_mode else 2360) }}"
                flare_now: "{{ (range(1, 11) | random) == 1 }}"
                dip_now: "{{ (range(1, 21) | random) == 1 }}"
                next_brightness: >-
                  {% if flare_now %}
                    {{ flare_brightness }}
                  {% elif dip_now %}
                    {{ dip_brightness }}
                  {% else %}
                    {{ [[current_brightness + (range(-16, 17) | random), min_brightness | int] | max, max_brightness | int] | min }}
                  {% endif %}
                next_kelvin: >-
                  {{ [[current_kelvin + (range(-55, 56) | random), min_kelvin] | max, max_kelvin | int] | min }}
                next_transition: "{{ [0.12, 0.16, 0.22, 0.28] | random }}"
                next_delay_ms: "{{ range(100, 301) | random }}"
            - continue_on_error: true
              action: light.turn_on
              target:
                entity_id: light.REPLACE_SINGLE_TARGET
              data:
                brightness: "{{ next_brightness }}"
                color_temp_kelvin: "{{ next_kelvin }}"
                transition: "{{ next_transition }}"
            - delay:
                milliseconds: "{{ next_delay_ms }}"

  candle_walk_lamp_2:
    alias: Candle Walk Lamp 2
    mode: restart
    sequence:
