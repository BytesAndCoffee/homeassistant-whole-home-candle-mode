              state: "on"
          sequence:
            - variables:
                cozy_mode: "{{ is_state('input_boolean.candle_mode_cozy', 'on') }}"
                min_brightness: "{{ 25 if cozy_mode else 153 }}"
                max_brightness: "{{ 76 if cozy_mode else 204 }}"
                flare_brightness: "{{ 89 if cozy_mode else 217 }}"
                dip_brightness: "{{ 12 if cozy_mode else 140 }}"
                min_kelvin: 2202
                max_kelvin: "{{ 2302 if cozy_mode else 2502 }}"
                current_brightness: "{{ state_attr('light.REPLACE_LAMP_3', 'brightness') | int(40 if cozy_mode else 179) }}"
                current_kelvin: "{{ state_attr('light.REPLACE_LAMP_3', 'color_temp_kelvin') | int(2240 if cozy_mode else 2360) }}"
                flare_now: "{{ (range(1, 11) | random) == 1 }}"
                dip_now: "{{ (range(1, 21) | random) == 1 }}"
                next_brightness: >-
                  {% if flare_now %}
